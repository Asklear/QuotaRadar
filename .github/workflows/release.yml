name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shell test dependencies
        run: brew install ripgrep

      - name: Install Python test dependencies
        run: python3 -m pip install --user pillow

      - name: Run behavior tests
        run: bash Tests/run_behavior_tests.sh

      - name: Build unsigned DMG
        run: scripts/package_dmg.sh --rebuild

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/QuotaRadar.dmg
          body: |
            Quota Radar macOS build.

            What's new in ${{ github.ref_name }}:
            - Refined the quota overview into a compact monitoring surface with provider-level rows and compressed account details.
            - Added a risk-first menu bar Attention Feed for low quota, expiring plans, failed checks, and recent consumption.
            - Added menu-bar-to-main-window handoff checks so attention items can open and highlight the matching provider/account.
            - Added release visual QA summaries with screenshot dimensions and focused-signal highlight counts.

            中文说明：
            - 将额度监控页收敛为紧凑监控界面：provider 汇总行优先，账号详情只保留核心信息。
            - 状态栏改为风险优先的 Attention Feed，突出低额度、即将到期、刷新失败和近期消耗。
            - 增加状态栏到主程序的联动检查，attention 条目可打开并高亮对应 provider / 账号。
            - 新增发布前视觉 QA summary，记录截图尺寸和聚焦信号高亮统计。

            This DMG is unsigned and not notarized because the project does not use a paid Apple Developer ID. macOS Gatekeeper may block the first launch after download. Only install it if you trust this repository and release.

            If macOS reports that the app is damaged or cannot be opened, install the app into /Applications and run:

            ```bash
            xattr -dr com.apple.quarantine '/Applications/Quota Radar.app'
            open '/Applications/Quota Radar.app'
            ```
