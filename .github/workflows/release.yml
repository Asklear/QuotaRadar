name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install shell test dependencies
        run: brew install ripgrep

      - name: Install Python test dependencies
        run: python3 -m pip install --user pillow

      - name: Run behavior tests
        run: bash Tests/run_behavior_tests.sh

      - name: Build unsigned DMG
        run: scripts/package_dmg.sh --rebuild

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/QuotaRadar.dmg
          body: |
            Quota Radar macOS build.

            What's new in ${{ github.ref_name }}:
            - Adapts Codex quota parsing to dynamic single- or dual-window responses.
            - Identifies each quota period from `limit_window_seconds` instead of assuming fixed primary/secondary positions.
            - Displays weekly-only or five-hour-only usage without synthesizing a missing period or retaining stale cached values.
            - Adds regression coverage for historical dual-window, weekly-only, five-hour-only, unknown-duration, and missing-reset responses.
            - This release publishes the Swift macOS DMG only.

            中文说明：
            - 兼容 Codex 动态单窗口或双窗口额度响应。
            - 根据 `limit_window_seconds` 判断额度周期，不再依赖 primary / secondary 固定位置。
            - 只有周额度或只有 5 小时额度时也能正常刷新，不补造缺失周期、不保留旧缓存。
            - 增加旧双窗口、仅周窗口、仅 5 小时窗口、未知时长和缺失重置时间的回归测试。
            - 本次只发布 Swift macOS DMG。

            This DMG is unsigned and not notarized because the project does not use a paid Apple Developer ID. macOS Gatekeeper may block the first launch after download. Only install it if you trust this repository and release.

            If macOS reports that the app is damaged or cannot be opened, install the app into /Applications and run:

            ```bash
            xattr -dr com.apple.quarantine '/Applications/Quota Radar.app'
            open '/Applications/Quota Radar.app'
            ```
