name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install shell test dependencies
        run: brew install ripgrep

      - name: Install Python test dependencies
        run: python3 -m pip install --user pillow

      - name: Run behavior tests
        run: bash Tests/run_behavior_tests.sh

      - name: Build unsigned DMG
        run: scripts/package_dmg.sh --rebuild

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/QuotaRadar.dmg
          body: |
            Quota Radar macOS build.

            What's new in ${{ github.ref_name }}:
            - Keeps the settings sidebar footer showing the installed version number, such as `v0.4.3`, at all times.
            - Keeps update-check status visible as a secondary line after manual or background checks.
            - Retains the Kimi duplicate quota-detail suppression and standard Swift-only unsigned DMG release path.
            - This release publishes the Swift macOS DMG only.

            中文说明：
            - 设置页侧边栏左下角会始终显示当前安装版本号，例如 `v0.4.3`。
            - 手动或后台检查更新后的状态会作为第二行辅助信息展示，不再覆盖版本号。
            - 保留 Kimi 重复额度明细抑制，以及 Swift-only 未签名 DMG 的标准发布路径。
            - 本次只发布 Swift macOS DMG。

            This DMG is unsigned and not notarized because the project does not use a paid Apple Developer ID. macOS Gatekeeper may block the first launch after download. Only install it if you trust this repository and release.

            If macOS reports that the app is damaged or cannot be opened, install the app into /Applications and run:

            ```bash
            xattr -dr com.apple.quarantine '/Applications/Quota Radar.app'
            open '/Applications/Quota Radar.app'
            ```
