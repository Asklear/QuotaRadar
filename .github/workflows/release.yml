name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install shell test dependencies
        run: brew install ripgrep

      - name: Install Python test dependencies
        run: python3 -m pip install --user pillow

      - name: Run behavior tests
        run: bash Tests/run_behavior_tests.sh

      - name: Build unsigned DMG
        run: scripts/package_dmg.sh --rebuild

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/QuotaRadar.dmg
          body: |
            Quota Radar macOS build.

            What's new in ${{ github.ref_name }}:
            - Added LongCat as one LLM provider with Token Pack quota and API pay-as-you-go balance under the same account row.
            - Hardened first-save web-login authorization capture for LongCat, including same-origin login-state probing and browser-identity fallback handling.
            - Added LongCat provider icon assets and companion API-key storage while keeping API keys copy-only for LongCat quota monitoring.
            - Localized LongCat authentication diagnostics so raw fields such as token, UUID, and login status are grouped into user-facing labels.
            - Localized quota-window details in expanded account rows, including token quota units and money-balance rows.
            - Switched Simplified/Traditional Chinese CNY labels to compact `¥` formatting.
            - This release publishes the Swift macOS DMG only.

            中文说明：
            - 新增 LongCat LLM provider，在同一个账号行中展示 Token 资源包额度和 API 按量余额。
            - 加固 LongCat 网页登录授权首次保存，支持同源登录状态探测和浏览器身份兜底。
            - 增加 LongCat provider 图标，并支持额外保存可复制 API Key；LongCat 额度监控仍使用网页登录授权。
            - 本地化 LongCat 认证诊断，把 token、UUID、登录状态等内部字段归并成用户可理解的名称。
            - 本地化展开账号行的额度明细，包括 token 数量和余额行。
            - 简体 / 繁体中文的人民币金额改为更紧凑的 `¥` 格式。
            - 本次只发布 Swift macOS DMG。

            This DMG is unsigned and not notarized because the project does not use a paid Apple Developer ID. macOS Gatekeeper may block the first launch after download. Only install it if you trust this repository and release.

            If macOS reports that the app is damaged or cannot be opened, install the app into /Applications and run:

            ```bash
            xattr -dr com.apple.quarantine '/Applications/Quota Radar.app'
            open '/Applications/Quota Radar.app'
            ```
