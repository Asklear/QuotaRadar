name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shell test dependencies
        run: brew install ripgrep

      - name: Install Python test dependencies
        run: python3 -m pip install --user pillow

      - name: Run behavior tests
        run: bash Tests/run_behavior_tests.sh

      - name: Build unsigned DMG
        run: scripts/package_dmg.sh --rebuild

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/QuotaRadar.dmg
          body: |
            Quota Radar macOS build.

            What's new in ${{ github.ref_name }}:
            - Easier quota overview: see which providers still have quota, which are low, and which checks failed without opening every provider dashboard.
            - Cleaner credential management: API keys can be saved and copied, while web login authorization is used only for quota checks.
            - Better provider coverage notes for Codex, Claude, Aliyun Coding Plan, Tencent Cloud Coding Plan, XFYun Spark, Volcengine, Querit, Exa, Serper, and other providers.
            - Provider-level diagnostics now avoid duplicate rows for copy-only companion API keys.
            - Chinese and English screenshots and the provider capability matrix were refreshed for this release.

            中文说明：
            - 主窗口和状态栏先按服务商汇总额度，更容易看出哪些还能用、哪些快用完、哪些检查失败。
            - API Key 和网页登录授权分开管理：API Key 可以保存和复制；网页登录授权只用于查询额度，不会当成 API Key 展示。
            - Codex、Claude、阿里云 Coding Plan、腾讯云 Coding Plan、讯飞星火、火山引擎、Querit、Exa、Serper 等服务商的额度来源和限制已经写入文档。
            - 诊断页不再为“仅用于保存/复制”的配套 API Key 生成重复额度行。
            - 本次发布更新了中英文截图和 provider capability matrix。

            This DMG is unsigned and not notarized because the project does not use a paid Apple Developer ID. macOS Gatekeeper may block the first launch after download. Only install it if you trust this repository and release.

            If macOS reports that the app is damaged or cannot be opened, install the app into /Applications and run:

            ```bash
            xattr -dr com.apple.quarantine '/Applications/Quota Radar.app'
            open '/Applications/Quota Radar.app'
            ```
