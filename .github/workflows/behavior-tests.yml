name: Behavior Tests

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/behavior-tests.yml"
      - "Package.swift"
      - "QuotaRadar/**"
      - "Tests/**"
      - "build.sh"
      - "install.sh"
      - "setup.sh"
      - "scripts/*.swift"
      - "scripts/package_dmg.sh"
      - "scripts/live_acceptance.sh"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/behavior-tests.yml"
      - "Package.swift"
      - "QuotaRadar/**"
      - "Tests/**"
      - "build.sh"
      - "install.sh"
      - "setup.sh"
      - "scripts/*.swift"
      - "scripts/package_dmg.sh"
      - "scripts/live_acceptance.sh"

jobs:
  behavior-tests:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install shell test dependencies
        run: brew install ripgrep

      - name: Install Python test dependencies
        run: python3 -m pip install --user pillow

      - name: Run behavior tests
        run: bash Tests/run_behavior_tests.sh
