name: Desktop Tauri Preview

on:
  workflow_dispatch:
  push:
    branches: ["main", "feat/tauri-multiplatform"]
    paths:
      - ".github/workflows/desktop-tauri.yml"
      - "apps/desktop-tauri/**"
      - "QuotaRadar/Assets.xcassets/ProviderIcons/**"
      - "docs/desktop-tauri-*.md"
      - "docs/tauri-provider-migration-checklist.md"
      - "scripts/*tauri*"
      - "scripts/check_tauri_sources.sh"
      - "scripts/run_tauri_cargo_tests.sh"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/desktop-tauri.yml"
      - "apps/desktop-tauri/**"
      - "QuotaRadar/Assets.xcassets/ProviderIcons/**"
      - "docs/desktop-tauri-*.md"
      - "docs/tauri-provider-migration-checklist.md"
      - "scripts/*tauri*"
      - "scripts/check_tauri_sources.sh"
      - "scripts/run_tauri_cargo_tests.sh"

jobs:
  desktop-tauri:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: quotaradar-tauri-preview-macos
          - os: windows-latest
            artifact_name: quotaradar-tauri-preview-windows-nsis
          - os: ubuntu-24.04
            artifact_name: quotaradar-tauri-preview-linux-deb

    defaults:
      run:
        working-directory: apps/desktop-tauri

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file
        working-directory: .

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tauri source safety checks
        run: bash ../../scripts/check_tauri_sources.sh

      - name: Run frontend unit tests
        run: pnpm test -- --run

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Test Rust backend
        run: bash ../../scripts/run_tauri_cargo_tests.sh

      - name: Build macOS Tauri app bundle
        if: runner.os == 'macOS'
        run: pnpm tauri build --bundles app --ci

      - name: Ad-hoc sign macOS app bundle
        if: runner.os == 'macOS'
        run: pnpm sign:mac

      - name: Stage macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          ditto -c -k --keepParent \
            "src-tauri/target/release/bundle/macos/Quota Radar Tauri Preview.app" \
            "artifacts/QuotaRadar-Tauri-Preview-macos.zip"

      - name: Build Windows Tauri installer
        if: runner.os == 'Windows'
        run: pnpm tauri build --bundles nsis --ci

      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item "src-tauri/target/release/bundle/nsis/*.exe" artifacts/

      - name: Build Linux Tauri package
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles deb --ci

      - name: Stage Linux artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/deb/*.deb artifacts/

      - name: Upload Tauri preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop-tauri/artifacts/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
